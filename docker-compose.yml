services:
  postgres:
    image: postgres:18-alpine
    container_name: opencops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opencops
      POSTGRES_PASSWORD: opencops
      POSTGRES_DB: opencops
    ports:
      - "5432:5432"
    volumes:
      - opencops_pg_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U opencops -d opencops" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  opencops_pg_data:
